{% extends 'base.html' %}

{% block content %}

<h2>Transactions</h2>

<!-- Add Transaction -->
<div class="card p-3 shadow mt-3">
    <div class="row">

        <div class="col-md-2">
            <input type="number" id="amount" class="form-control" placeholder="Amount">
        </div>

        <div class="col-md-2">
            <select id="type" class="form-control" onchange="filterCategories()">
                <option value="income">Income</option>
                <option value="expense">Expense</option>
            </select>
        </div>

        <div class="col-md-2">
            <select id="category" class="form-control">
                <option value="">Select Category</option>
            </select>
        </div>

        <div class="col-md-2">
            <input type="date" id="date" class="form-control">
        </div>

        <div class="col-md-2">
            <button onclick="addTransaction()" class="btn btn-success w-100">
                Add Transaction
            </button>
        </div>

    </div>
</div>

<!-- Add Category -->
<h4 class="mt-4">Add New Category</h4>

<div class="card p-3 shadow mt-2">
    <div class="row">

        <div class="col-md-4">
            <input type="text" id="new_category_name" class="form-control" placeholder="Category Name">
        </div>

        <div class="col-md-4">
            <select id="new_category_type" class="form-control">
                <option value="income">Income</option>
                <option value="expense">Expense</option>
            </select>
        </div>

        <div class="col-md-4">
            <button onclick="addCategory()" class="btn btn-primary w-100">
                Add Category
            </button>
        </div>

    </div>
</div>

<!-- Delete Category -->
<h5 class="mt-4">Delete Category</h5>

<select id="delete_category" class="form-control mb-2">
    <option value="" disabled selected>Select Category to Delete</option>
</select>

<button onclick="deleteCategory()" class="btn btn-danger">
    Delete Category
</button>

<div class="row mt-4">

    <div class="col-md-4">
        <div class="card p-3 shadow text-center">
            <h6>Total Income</h6>
            <h3 id="total_income">0</h3>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card p-3 shadow text-center">
            <h6>Total Expense</h6>
            <h3 id="total_expense">0</h3>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card p-3 shadow text-center">
            <h6>Balance</h6>
            <h3 id="balance">0</h3>
        </div>
    </div>

</div>


<!-- Filters -->
<div class="card p-3 shadow mt-4">
    <div class="row">

        <div class="col-md-3">
            <label>From Date</label>
            <input type="date" id="start_date" class="form-control">
        </div>

        <div class="col-md-3">
            <label>To Date</label>
            <input type="date" id="end_date" class="form-control">
        </div>

        <div class="col-md-3">
            <label>Show Entries</label>
            <select id="limit" class="form-control">
                <option value="5">5</option>
                <option value="10">10</option>
                <option value="20">20</option>
                <option value="100">100</option>
            </select>
        </div>

        <div class="col-md-3 d-flex align-items-end">
            <button onclick="loadTransactions()" class="btn btn-dark w-100">
                Apply Filter
            </button>
        </div>

    </div>
</div>

<!-- Table -->
<table class="table table-bordered mt-4">
    <thead class="table-dark">
        <tr>
            <th>Amount</th>
            <th>Type</th>
            <th>Category</th>
            <th>Date</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody id="transaction-table"></tbody>
</table>
<div class="d-flex justify-content-between mt-3">

    <button onclick="prevPage()" class="btn btn-secondary">
        Previous
    </button>

    <span id="page-number">Page 1</span>

    <button onclick="nextPage()" class="btn btn-secondary">
        Next
    </button>

</div>

<!-- Charts -->
<div class="row mt-5">

    <div class="col-md-6">
        <div class="card p-3 shadow">
            <h5>Expense Breakdown</h5>
            <canvas id="categoryChart"></canvas>
        </div>
    </div>

    <div class="col-md-6">
        <div class="card p-3 shadow">
            <h5>Income vs Expense</h5>
            <canvas id="summaryChart"></canvas>
        </div>
    </div>

</div>

<script>

let editingId = null;

const token = localStorage.getItem("access");
let currentPage = 1;
let totalPages = 1;   // 🔥 NEW
if (!token) window.location.href = "/login/";

let allCategories = [];
let categoryChartInstance = null;
let summaryChartInstance = null;

// default date
document.getElementById("date").value =
    new Date().toISOString().split("T")[0];

// auth helper
async function fetchWithAuth(url, options = {}) {
    options.headers = {
        ...options.headers,
        "Authorization": "Bearer " + token
    };

    const response = await fetch(url, options);

    if (response.status === 401) {
        localStorage.removeItem("access");
        window.location.href = "/login/";
        return null;
    }

    return response;
}

// 🔹 Load Transactions
//console.log("Edit clicked", id);
async function loadTransactions() {

    const startDate = document.getElementById("start_date").value;
    const endDate = document.getElementById("end_date").value;
    const limit = document.getElementById("limit").value;

    let url = `/api/transactions/?page=${currentPage}&limit=${limit}`;

    if (startDate && endDate) {
        url += `&start_date=${startDate}&end_date=${endDate}`;
    }

    const response = await fetchWithAuth(url);
    if (!response) return;

    const res = await response.json();
    totalPages = Math.ceil(res.total / res.limit);

    const table = document.getElementById("transaction-table");
    table.innerHTML = "";

    if (!res.data || res.data.length === 0) {
        table.innerHTML = `<tr><td colspan="5">No data</td></tr>`;
        return;
    }

    res.data.forEach(tx => {
        table.innerHTML += `
            <tr>
                <td>${tx.amount}</td>
                <td>${tx.type}</td>
                <td>${tx.category_name}</td>
                <td>${tx.date}</td>
                <td>
                    <button onclick='startEdit(${tx.id}, ${tx.amount}, "${tx.type}", ${tx.category}, "${tx.date}")'
                        class="btn btn-warning btn-sm">
                        Edit
                    </button>

                    <button onclick="deleteTransaction(${tx.id})"
                        class="btn btn-danger btn-sm">
                        Delete
                    </button>
                </td>
            </tr>
        `;
    });
    document.querySelector("button[onclick='prevPage()']").disabled = currentPage === 1;

    document.querySelector("button[onclick='nextPage()']").disabled = currentPage >= totalPages;
}

// 🔹 Load Categories
async function loadCategories() {

    const response = await fetchWithAuth("/api/transactions/categories/");
    const data = await response.json();

    allCategories = data;

    const deleteDropdown = document.getElementById("delete_category");

    deleteDropdown.innerHTML =
        '<option value="" disabled selected>Select Category to Delete</option>';

    data.forEach(cat => {
        deleteDropdown.innerHTML += `
            <option value="${cat.id}">${cat.name}</option>
        `;
    });

    filterCategories();
}

// 🔹 Filter Categories
function filterCategories() {

    const selectedType = document.getElementById("type").value;
    const dropdown = document.getElementById("category");

    dropdown.innerHTML = '<option value="">Select Category</option>';

    allCategories.forEach(cat => {
        if (cat.type === selectedType) {
            dropdown.innerHTML += `
                <option value="${cat.id}">${cat.name}</option>
            `;
        }
    });
}

// 🔹 Add Transaction
async function addTransaction() {

    const amount = document.getElementById("amount").value;
    const type = document.getElementById("type").value;
    const category = document.getElementById("category").value;
    const date = document.getElementById("date").value;

    if (!amount || !category || !date) {
        alert("Fill all fields!");
        return;
    }

    let url = "/api/transactions/add/";
    let method = "POST";

    if (editingId) {
        url = `/api/transactions/update/${editingId}/`;
        method = "PUT";
    }

    const response = await fetchWithAuth(url, {
        method: method,
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ amount, type, category, date })
    });

    if (response.ok) {

        alert(editingId ? "Transaction updated!" : "Transaction added!");

        document.getElementById("amount").value = "";
        document.getElementById("category").value = "";

        editingId = null;

        document.querySelector("button.btn-success").innerText = "Add Transaction";

        refreshAll();
    }
}

// 🔹 Delete Transaction
async function deleteTransaction(id) {

    if (!confirm("Delete this transaction?")) return;

    const response = await fetchWithAuth(`/api/transactions/delete/${id}/`, {
        method: "DELETE"
    });

    if (response && response.ok) {
        alert("Deleted!");
        refreshAll();
    }
}

// 🔹 Add Category
async function addCategory() {

    const name = document.getElementById("new_category_name").value;
    const type = document.getElementById("new_category_type").value;

    if (!name) {
        alert("Enter category name!");
        return;
    }

    const response = await fetchWithAuth("/api/transactions/add-category/", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, type })
    });

    if (response.ok) {
        alert("Category added!");
        document.getElementById("new_category_name").value = "";
        refreshAll();
    }
}

// 🔹 Delete Category
async function deleteCategory() {

    const id = document.getElementById("delete_category").value;

    if (!id) {
        alert("Select category!");
        return;
    }

    if (!confirm("Delete this category?")) return;

    const response = await fetchWithAuth(`/api/transactions/delete-category/${id}/`, {
        method: "DELETE"
    });

    if (response && response.ok) {
        alert("Category deleted!");
        refreshAll();
    }
}

// 🔥 Category Chart
async function loadCategoryChart() {

    const response = await fetchWithAuth("/api/transactions/category-breakdown/");
    if (!response) return;

    const data = await response.json();

    const ctx = document.getElementById("categoryChart");

    if (categoryChartInstance) categoryChartInstance.destroy();

    if (!data.length) return;

    categoryChartInstance = new Chart(ctx, {
        type: "pie",
        data: {
            labels: data.map(d => d.category),
            datasets: [{ data: data.map(d => d.total) }]
        }
    });
}

// 🔥 Summary Chart
async function loadSummaryChart() {

    //const month = new Date().toISOString().slice(0, 7);

    const response = await fetchWithAuth("/api/transactions/summary/overall/");
    if (!response) return;

    const data = await response.json();

    const ctx = document.getElementById("summaryChart");

    if (summaryChartInstance) summaryChartInstance.destroy();

    summaryChartInstance = new Chart(ctx, {
        type: "bar",
        data: {
            labels: ["Income", "Expense"],
            datasets: [{
                data: [data.total_income, data.total_expense]
            }]
        }
    });
}

async function loadSummaryCards() {

    const response = await fetchWithAuth("/api/transactions/summary/overall/");
    if (!response) return;

    const data = await response.json();

    const income = data.total_income || 0;
    const expense = data.total_expense || 0;
    const balance = income - expense;

    document.getElementById("total_income").innerText = income;
    document.getElementById("total_expense").innerText = expense;
    document.getElementById("balance").innerText = balance;

    // optional color styling
    const balanceEl = document.getElementById("balance");
    balanceEl.style.color = balance >= 0 ? "green" : "red";
}



function startEdit(id, amount, type, category, date) {

    editingId = id;

    // fill form with existing data
    document.getElementById("amount").value = amount;
    document.getElementById("type").value = type;

    filterCategories();

    setTimeout(() => {
        document.getElementById("category").value = category;
    }, 100);

    document.getElementById("date").value = date;

    // change button text
    document.querySelector("button.btn-success").innerText = "Update Transaction";
}
function nextPage() {
    if (currentPage < totalPages) {
        currentPage++;
        loadTransactions();
        document.getElementById("page-number").innerText =
    `Page ${currentPage} of ${totalPages}`; 
    }
}

function prevPage() {
    if (currentPage > 1) {
        currentPage--;
        loadTransactions();
        document.getElementById("page-number").innerText =
        `Page ${currentPage} of ${totalPages}`;
    }
}

// 🔥 Master Refresh
function refreshAll() {
    loadTransactions();
    loadCategories();
    loadCategoryChart();
    loadSummaryChart();
    loadSummaryCards(); // 🔥 ADD THIS
}

// 🔥 Initial Load
refreshAll();

</script>

{% endblock %}
